<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Hackerman animated terminal clock favicon</title>
  <desc id="desc">An aggressive cyberpunk terminal clock with layered red glow, rotating HUD rings, glitch accents, and scanline animation.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="44%" r="78%"><stop offset="0%" stop-color="#11161d"/><stop offset="42%" stop-color="#070a0f"/><stop offset="78%" stop-color="#020305"/><stop offset="100%" stop-color="#000000"/></radialGradient>
    <radialGradient id="coreBloom" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#ff7849" stop-opacity="0.22"/><stop offset="45%" stop-color="#ff3b30" stop-opacity="0.08"/><stop offset="100%" stop-color="#ff3b30" stop-opacity="0"/></radialGradient>
    <linearGradient id="hotArc" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffb08f"/><stop offset="22%" stop-color="#ff7849"/><stop offset="58%" stop-color="#ff3b30"/><stop offset="100%" stop-color="#d7120a"/></linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M32 0H0V32" fill="none" stroke="#1f2733" stroke-width="1" opacity="0.22"/></pattern>
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse"><rect width="4" height="1" fill="#ebe4d2" opacity="0.018"/></pattern>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="8"/></filter>
    <style>
      .scan{animation:scanMove 5s linear infinite}.hud-slow{transform-origin:256px 256px;animation:spin 18s linear infinite}.hud-fast{transform-origin:256px 256px;animation:spinReverse 10s linear infinite}.pulse-wide{animation:pulseWide 1.8s ease-in-out infinite}.pulse-mid{animation:pulseMid 1.8s ease-in-out infinite}.pulse-core{animation:pulseCore 1.8s ease-in-out infinite}.glitch-a{animation:glitchA 3.2s steps(1,end) infinite}.glitch-b{animation:glitchB 2.7s steps(1,end) infinite}.cursor{animation:blink .9s steps(1,end) infinite}
      @keyframes scanMove{from{transform:translateY(-8px)}to{transform:translateY(8px)}}@keyframes spin{to{transform:rotate(360deg)}}@keyframes spinReverse{to{transform:rotate(-360deg)}}@keyframes pulseWide{0%,100%{opacity:.13;stroke-width:64}50%{opacity:.38;stroke-width:78}}@keyframes pulseMid{0%,100%{opacity:.34;stroke-width:42}50%{opacity:.78;stroke-width:52}}@keyframes pulseCore{0%,100%{opacity:.88;stroke-width:20}50%{opacity:1;stroke-width:25}}@keyframes glitchA{0%,91%,100%{transform:translate(0,0);opacity:0}92%{transform:translate(-8px,1px);opacity:.65}94%{transform:translate(6px,-1px);opacity:.4}96%{transform:translate(0,0);opacity:0}}@keyframes glitchB{0%,84%,100%{transform:translate(0,0);opacity:0}85%{transform:translate(9px,0);opacity:.45}88%{transform:translate(-5px,1px);opacity:.55}90%{transform:translate(0,0);opacity:0}}@keyframes blink{0%,48%{opacity:1}49%,100%{opacity:.16}}@media (prefers-reduced-motion:reduce){*{animation:none!important}}
    </style>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/><rect width="512" height="512" fill="url(#grid)"/><circle cx="256" cy="256" r="225" fill="url(#coreBloom)"/><rect class="scan" width="512" height="512" fill="url(#scanlines)"/>
  <g fill="none" stroke="#1f2733" stroke-width="3" opacity="0.9"><path d="M44 118V44H118"/><path d="M394 44H468V118"/><path d="M44 394V468H118"/><path d="M394 468H468V394"/></g>
  <g stroke="#ff7849" stroke-width="2" opacity="0.55"><path d="M256 22V50M242 36H270"/><path d="M256 462V490M242 476H270"/><path d="M22 256H50M36 242V270"/><path d="M462 256H490M476 242V270"/></g>
  <g class="hud-slow" fill="none" stroke="#1f2733" stroke-width="3" stroke-dasharray="14 10" opacity="0.72"><circle cx="256" cy="256" r="204"/></g>
  <g class="hud-fast" fill="none" stroke="#ff7849" stroke-width="2" stroke-dasharray="4 18" opacity="0.38"><circle cx="256" cy="256" r="190"/></g>
  <circle cx="256" cy="256" r="168" fill="none" stroke="#111821" stroke-width="24"/>
  <circle class="pulse-wide" cx="256" cy="256" r="168" fill="none" stroke="#ff1f14" stroke-linecap="butt" stroke-dasharray="454 602" transform="rotate(-90 256 256)"/>
  <circle class="pulse-mid" cx="256" cy="256" r="168" fill="none" stroke="#ff3b30" stroke-linecap="butt" stroke-dasharray="454 602" transform="rotate(-90 256 256)"/>
  <circle class="pulse-core" cx="256" cy="256" r="168" fill="none" stroke="url(#hotArc)" stroke-linecap="butt" stroke-dasharray="454 602" transform="rotate(-90 256 256)"/>
  <circle cx="256" cy="256" r="168" fill="none" stroke="#ffd2c2" stroke-width="4" stroke-opacity="0.95" stroke-dasharray="454 602" transform="rotate(-90 256 256)"/>
  <circle cx="256" cy="256" r="150" fill="#ff3b30" opacity="0.025" filter="url(#softGlow)"/>
  <g transform="translate(256 256)" stroke="#d9c9a8" stroke-width="5" stroke-linecap="square" opacity="0.92">
    <line x1="0" y1="-136" x2="0" y2="-120"/><line x1="0" y1="-136" x2="0" y2="-120" transform="rotate(30)"/><line x1="0" y1="-136" x2="0" y2="-120" transform="rotate(60)"/><line x1="0" y1="-136" x2="0" y2="-120" transform="rotate(90)"/><line x1="0" y1="-136" x2="0" y2="-120" transform="rotate(120)"/><line x1="0" y1="-136" x2="0" y2="-120" transform="rotate(150)"/><line x1="0" y1="-136" x2="0" y2="-120" transform="rotate(180)"/><line x1="0" y1="-136" x2="0" y2="-120" transform="rotate(210)"/><line x1="0" y1="-136" x2="0" y2="-120" transform="rotate(240)"/><line x1="0" y1="-136" x2="0" y2="-120" transform="rotate(270)"/><line x1="0" y1="-136" x2="0" y2="-120" transform="rotate(300)"/><line x1="0" y1="-136" x2="0" y2="-120" transform="rotate(330)"/>
  </g>
  <g stroke="#ebe4d2" stroke-width="14" stroke-linecap="square"><line x1="256" y1="256" x2="256" y2="150"/><line x1="256" y1="256" x2="328" y2="328"/></g><circle cx="256" cy="256" r="18" fill="#d9c9a8"/><circle cx="256" cy="256" r="6" fill="#ff7849"/>
  <g fill="none" stroke="#ebe4d2" stroke-width="15" stroke-linecap="square" stroke-linejoin="miter"><path d="M116 220L162 256L116 292"/><path d="M170 292H215"/></g><rect class="cursor" x="221" y="280" width="8" height="16" fill="#ff7849"/>
  <g class="glitch-a" opacity="0"><rect x="90" y="196" width="330" height="8" fill="#ff3b30"/><rect x="126" y="306" width="280" height="5" fill="#ebe4d2"/></g>
  <g class="glitch-b" opacity="0"><rect x="104" y="236" width="304" height="6" fill="#ff7849"/><rect x="150" y="344" width="220" height="4" fill="#e85952"/></g>
  <g fill="#ff7849"><rect x="72" y="142" width="7" height="7"/><rect x="433" y="368" width="5" height="5"/></g><g fill="#82bd7f"><rect x="431" y="142" width="5" height="5"/></g><g fill="#f0b450"><rect x="74" y="366" width="5" height="5"/></g>
  <g fill="#d9c9a8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="11" opacity="0.52"><text x="64" y="96">NODE://ACTIVE</text><text x="346" y="96">TICK 9845</text><text x="66" y="424">SYS.UPTIME</text><text x="347" y="424">00:42:17</text></g>
</svg>
