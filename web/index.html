<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="mask-icon" href="/favicon.svg" color="#ef4444" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="description" content="Self-hosted WakaTime-compatible coding activity dashboard with Apple Watch health overlay." />
    <title>Boomtime</title>
    <script>
      // No-flash theme init — defaults to dark, mirrors ThemeProvider read logic.
      (function () {
        try {
          var t = localStorage.getItem("boomtime-theme");
          if (t === "system") {
            t = window.matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark";
          }
          if (t !== "light") t = "dark"; // default to dark
          var root = document.documentElement;
          root.classList.toggle("dark", t === "dark");
          root.style.colorScheme = t;
        } catch (e) {
          document.documentElement.classList.add("dark");
          document.documentElement.style.colorScheme = "dark";
        }
      })();
    </script>
  </head>
  <body class="h-full">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
