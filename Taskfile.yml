version: "3"

dotenv: [".env"]

env:
  BOOM_PORT: '{{.BOOM_PORT | default "8080"}}'

vars:
  PKG: ./cmd/boomtime
  # Isolated DB for the Go test suite (never the dev/panda `test` DB).
  TEST_DB_URL: '{{.BOOM_TEST_DATABASE_URL | default "postgres://test:test@localhost:5432/boomtime_test?sslmode=disable"}}'
  # Dev DB used ONLY as a read-only source when regenerating fixtures.
  DEV_DB_URL: '{{.DEV_DB_URL | default "postgres://test:test@localhost:5432/boomtime?sslmode=disable"}}'
  # Version stamped into the binary at build time. `--always` returns the short
  # SHA before we cut the first tag; `--dirty` appends -dirty on uncommitted
  # trees. Override with VERSION=vX.Y.Z on the command line.
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo dev
  # BRANCH / COMMIT / BUILDTIME feed /healthz alongside VERSION. Silent
  # fallbacks keep bare `task build` working outside a git worktree.
  BRANCH:
    sh: git branch --show-current 2>/dev/null || echo ""
  COMMIT:
    sh: git rev-parse HEAD 2>/dev/null || echo ""
  BUILDTIME:
    sh: date -u +%Y-%m-%dT%H:%M:%SZ
  # GHCR image reference. Override with IMAGE=ghcr.io/<owner>/<name>.
  IMAGE: '{{.IMAGE | default "ghcr.io/thebranchdriftcatalyst/boomtime"}}'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  setup:
    desc: One-time setup — copy .env, install Go + frontend deps
    cmds:
      - '[ -f .env ] || cp .env.example .env'
      - go mod download
      - task: web:install
      - 'echo "✓ setup complete — run: task db:up && task dev"'

  # ── Database ────────────────────────────────────────────────────────────────
  db:up:
    desc: Start the Postgres dev database (docker compose)
    cmds:
      - docker compose up -d db
      - 'echo "waiting for postgres..." && until docker compose exec -T db pg_isready -U "$BOOM_DB_USER" >/dev/null 2>&1; do sleep 1; done'
      - echo "✓ db ready on port $BOOM_DB_PORT"

  db:down:
    desc: Stop the dev database
    cmds:
      - docker compose stop db

  # ── Dockerized dev stack (db + live-reload API + vite) ───────────────────────
  docker:dev:
    desc: Bring up the FULL dev stack in Docker (db + api via air + vite). App on :8080, UI on :5173
    cmds:
      - docker compose up --build

  docker:down:
    desc: Stop the dockerized dev stack
    cmds:
      - docker compose down

  docker:build:
    desc: 'Build the production image, version-tagged. Vars: IMAGE, VERSION'
    cmds:
      - >-
        docker build
        --build-arg VERSION={{.VERSION}}
        --build-arg BRANCH={{.BRANCH}}
        --build-arg COMMIT={{.COMMIT}}
        --build-arg BUILDTIME={{.BUILDTIME}}
        -t {{.IMAGE}}:{{.VERSION}}
        -t {{.IMAGE}}:latest
        .
      - 'echo "✓ built {{.IMAGE}}:{{.VERSION}} (+ :latest)"'

  docker:push:
    desc: 'Push the version + latest tags to GHCR (docker login ghcr.io first). Vars: IMAGE, VERSION'
    cmds:
      - docker push {{.IMAGE}}:{{.VERSION}}
      - docker push {{.IMAGE}}:latest

  db:reset:
    desc: Destroy and recreate the dev database (drops all data)
    cmds:
      - docker compose down -v
      - task: db:up
      - task: migrate

  db:psql:
    desc: Open a psql shell on the dev database
    cmds:
      - docker compose exec db psql -U "$BOOM_DB_USER" -d "$BOOM_DB_NAME"

  db:mermaid:
    desc: Generate a Mermaid ERD (docs/db-erd.mmd) from the dev database schema
    cmds:
      - task: db:up
      # mermerd (github.com/KarnerTh/mermerd) does 90% of the work — auto-install if absent
      - 'test -x "$(go env GOPATH)/bin/mermerd" || go install github.com/KarnerTh/mermerd@latest'
      - mkdir -p docs
      - '"$(go env GOPATH)/bin/mermerd" -c "{{.DEV_DB_URL}}" -s public --useAllTables --showAllConstraints -o docs/db-erd.mmd'
      - 'echo "OK ERD written to docs/db-erd.mmd - paste into any Mermaid viewer"'

  migrate:
    desc: Apply pending database migrations
    cmds:
      - go run {{.PKG}} run-migrations

  # ── Development ──────────────────────────────────────────────────────────────
  dev:
    desc: Run backend (air) + frontend (vite) together
    deps: [dev:be, dev:fe]

  dev:be:
    desc: Run the Go server with live reload (air)
    cmds:
      - air

  dev:fe:
    desc: Run the Vite dev server
    dir: web
    cmds:
      - npm run dev

  # ── Server CLI ───────────────────────────────────────────────────────────────
  run:
    desc: Build and run the server once (no live reload)
    cmds:
      - go run {{.PKG}} run

  create-user:
    desc: 'Create a user — usage: task create-user -- -u <username>'
    cmds:
      - go run {{.PKG}} create-user {{.CLI_ARGS}}

  create-token:
    desc: 'Create an API token — usage: task create-token -- -u <username>'
    cmds:
      - go run {{.PKG}} create-token {{.CLI_ARGS}}

  gen-data:
    desc: 'Seed fake heartbeats — usage: task gen-data -- --token <t> --num 200'
    cmds:
      - go run ./tools/gendata {{.CLI_ARGS}}

  icons:
    desc: 'Rebuild web favicon + iOS/watchOS App Icons from boomtime.svg'
    cmds:
      - scripts/rasterize-icon.sh {{.CLI_ARGS}}

  # ── Frontend ─────────────────────────────────────────────────────────────────
  web:install:
    desc: Install frontend dependencies
    dir: web
    cmds:
      - npm install

  web:build:
    desc: Build the frontend into web/dist
    dir: web
    cmds:
      - npm run build

  # ── Build & quality ──────────────────────────────────────────────────────────
  build:
    desc: Build the single self-contained binary (embeds the built SPA + version)
    deps: [web:build]
    cmds:
      - rm -rf internal/server/dist && cp -r web/dist internal/server/dist
      - >-
        go build
        -ldflags "-s -w -X main.version={{.VERSION}} -X main.branch={{.BRANCH}} -X main.commit={{.COMMIT}} -X main.buildTime={{.BUILDTIME}}"
        -o bin/boomtime {{.PKG}}
      - 'echo "✓ built bin/boomtime ({{.VERSION}})"'

  version:
    desc: Print the version that a `task build` would stamp into the binary
    cmds:
      - 'echo "{{.VERSION}}"'
    silent: true

  changelog:
    desc: Regenerate CHANGELOG.md from conventional-commit history (requires git-cliff)
    cmds:
      - 'command -v git-cliff >/dev/null || { echo "install git-cliff: brew install git-cliff (macOS) or https://git-cliff.org/docs/installation"; exit 1; }'
      - git-cliff -o CHANGELOG.md
      - 'echo "✓ regenerated CHANGELOG.md"'

  release:
    desc: 'Bump version from commit history, regen changelog, commit, tag. Vars: VERSION=vX.Y.Z to override the bump'
    preconditions:
      - sh: '[ -z "$(git status --porcelain)" ]'
        msg: working tree must be clean before cutting a release
      - sh: 'command -v git-cliff >/dev/null'
        msg: git-cliff is required (brew install git-cliff)
    cmds:
      # A single shell so $NEXT scopes across the whole sequence (Task runs each
      # `cmds` entry in its own shell otherwise).
      - |
        set -eu
        NEXT="{{.VERSION}}"
        # If the caller didn't override VERSION, ask git-cliff to compute the
        # next semver from the commit history since the last tag.
        if [ -z "$NEXT" ] || [ "$NEXT" = "dev" ]; then
          NEXT=$(git-cliff --bumped-version)
        fi
        echo "cutting release: $NEXT"
        git-cliff --tag "$NEXT" -o CHANGELOG.md
        git add CHANGELOG.md
        git commit -m "chore(release): $NEXT"
        git tag -a "$NEXT" -m "$NEXT"
        echo "✓ tagged $NEXT — push with: git push --follow-tags"

  test:
    desc: Run Go tests against the ISOLATED boomtime_test database
    cmds:
      - task: db:up
      - 'BOOM_TEST_DATABASE_URL="{{.TEST_DB_URL}}" go test ./...'

  test:db:reset:
    desc: Drop and recreate the isolated boomtime_test database
    cmds:
      - task: db:up
      - docker compose exec -T db psql -U "$BOOM_DB_USER" -d postgres -c 'DROP DATABASE IF EXISTS boomtime_test;'
      - docker compose exec -T db psql -U "$BOOM_DB_USER" -d postgres -c 'CREATE DATABASE boomtime_test;'
      - 'echo "✓ boomtime_test reset (TestMain will re-migrate on next test run)"'

  fixtures:gen:
    desc: 'Regenerate the anonymized heartbeat fixture from the dev DB (SELECT-only). Vars: SENDER, PROJECTS, DAYS, MAX'
    cmds:
      - >-
        go run ./tools/fixturegen
        --source "{{.DEV_DB_URL}}"
        --sender "{{.SENDER | default "panda"}}"
        --projects {{.PROJECTS | default "12"}}
        --days {{.DAYS | default "90"}}
        --max {{.MAX | default "3000"}}
        --out internal/db/testdata/heartbeats_fixture.json
      - 'echo "✓ wrote internal/db/testdata/heartbeats_fixture.json (anonymized)"'

  fixtures:gen:raw:
    desc: Emit a LOCAL (gitignored) fixture with REAL values for debugging
    cmds:
      - >-
        go run ./tools/fixturegen
        --source "{{.DEV_DB_URL}}"
        --sender "{{.SENDER | default "panda"}}"
        --raw
        --out internal/db/testdata/heartbeats_fixture.local.json
      - 'echo "✓ wrote internal/db/testdata/heartbeats_fixture.local.json (REAL values, gitignored)"'

  fmt:
    desc: Format Go code
    cmds:
      - go fmt ./...

  vet:
    desc: Vet Go code
    cmds:
      - go vet ./...

  lint:
    desc: Run go vet + frontend lint
    cmds:
      - task: vet
      - '{{if .SKIP_FE_LINT}}echo "skip fe lint"{{else}}cd web && npm run lint{{end}}'

  tidy:
    desc: Tidy Go modules
    cmds:
      - go mod tidy
