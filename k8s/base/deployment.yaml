---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: boomtime
  labels:
    app: boomtime
    app.kubernetes.io/name: boomtime
    app.kubernetes.io/part-of: catalyst
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: boomtime
  template:
    metadata:
      labels:
        app: boomtime
        app.kubernetes.io/name: boomtime
    spec:
      containers:
        - name: boomtime
          # Image path follows the repo name. Overridden per-cluster by the
          # overlay's kustomize images: block + Argo Image Updater (which
          # rewrites the pinned sha-<7c> tag on every new main push).
          image: ghcr.io/thebranchdriftcatalyst/boomtime:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: boomtime-config
            - secretRef:
                name: boomtime-secrets
                optional: true
            # BOOM_ENCRYPTION_KEY for encryption-at-rest of user secrets
            # (imported Wakatime API keys). Provisioned by the overlay:
            # - talos00-knowledgedump: ExternalSecret pulls from 1Password
            #   vault item `boomtime` field `encryption-key` (see
            #   external-secret.yaml). Falls back to boomtime-encryption-key
            #   Secret (manually created) if 1P field not yet populated.
            # - local: a stub key in overlays/local/secrets.yaml.
            # Marked optional so dev/test overlays without either can still
            # boot with a WARN; the prod-startup gate in cmd/boomtime/main.go
            # refuses to run when BOOM_ENV=prod and the key is missing.
            - secretRef:
                name: boomtime-encryption-key
                optional: true
          env:
            # DB credentials come from the CNPG-managed (prod) or overlay-provided
            # (local) `boomtime-postgres-app` Secret. CNPG populates username/password
            # on that Secret automatically.
            - name: BOOM_DB_USER
              valueFrom:
                secretKeyRef:
                  name: boomtime-postgres-app
                  key: username
            - name: BOOM_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: boomtime-postgres-app
                  key: password
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
