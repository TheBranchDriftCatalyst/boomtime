---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Argo CD Application spec.source.path points here.
namespace: boomtime

resources:
  - ../../base
  - postgres-cluster.yaml
  - external-secret.yaml
  - ingressroute.yaml

# The Argo Application tracks the `main` branch. This kustomize `newTag`
# is a starting hint — the live authority is the ImageUpdater CRD at
# talos-homelab:infrastructure/base/argocd/image-updater/boomtime-image-updater.yaml,
# which rewrites spec.source.kustomize.images on the Argo Application whenever
# ghcr publishes a new tag matching its allowTags regex
# (latest|main|sha-<7c>). The immutable sha-<7c> tag is what drives per-commit
# auto-deploy off main pushes.
images:
  - name: ghcr.io/thebranchdriftcatalyst/boomtime
    newTag: latest
