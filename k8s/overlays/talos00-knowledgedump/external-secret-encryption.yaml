---
# ESO for BOOM_ENCRYPTION_KEY (encryption-at-rest of user secrets like
# imported Wakatime API keys). Separate ExternalSecret so a missing 1P
# field only fails the encryption-key reconciliation, not the whole
# boomtime-secrets set (github-token, remote-write-*).
#
# ── ACTIVATION STEPS ──────────────────────────────────────────────────
# 1. Add a text/password field `encryption-key` to the 1Password item
#    `boomtime` in the `catalyst-eso` vault (or wherever the boomtime
#    ClusterSecretStore points). Value must be exactly 32 bytes,
#    base64-encoded — generate with: `openssl rand -base64 32`
#
# 2. Add this file to k8s/overlays/talos00-knowledgedump/kustomization.yaml
#    under `resources:` so it gets applied by Argo. Then commit + push.
#
# 3. Once ESO reconciles (~1 min), the `boomtime-encryption-key` Secret
#    it manages will overwrite the manually-created one bearing the same
#    name. The deployment already references this secret name via
#    envFrom in base/deployment.yaml, so no other change is needed.
#
# 4. When ESO management is confirmed working:
#      kubectl -n boomtime get secret boomtime-encryption-key -o yaml
#    should show the ExternalSecret owner annotations.
# ──────────────────────────────────────────────────────────────────────
#
# UNTIL activation: the manually-created `boomtime-encryption-key` Secret
# (from `kubectl create secret generic ...`) supplies BOOM_ENCRYPTION_KEY.
# Its key material is NOT backed up anywhere — losing the cluster loses
# access to any user's encrypted Wakatime API key. Populate 1P to remove
# that single point of failure.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: boomtime-encryption-key
  labels:
    app.kubernetes.io/name: boomtime
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: boomtime-encryption-key
    creationPolicy: Owner
    template:
      data:
        BOOM_ENCRYPTION_KEY: "{{ .encryptionKey }}"
  data:
    - secretKey: encryptionKey
      remoteRef:
        key: boomtime
        property: encryption-key
