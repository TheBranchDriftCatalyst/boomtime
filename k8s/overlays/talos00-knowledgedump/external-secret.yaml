---
# Pulls runtime secrets from 1Password vault `catalyst-eso`, item `boomtime`.
# The 1P item must expose fields matching remoteRef.property below.
# Fields to provision in the 1P item:
#   - github-token            → GITHUB_TOKEN (attribute time to commits)
#   - remote-write-url        → BOOM_REMOTE_WRITE_URL (optional forward target)
#   - remote-write-token      → BOOM_REMOTE_WRITE_TOKEN (optional)
# NOT here:
#   - DB creds (BOOM_DB_USER / BOOM_DB_PASS) — come from CNPG-managed
#     `boomtime-postgres-app` Secret; see deployment.yaml.
#   - WAKATIME_API_KEY — supplied per-user from the frontend, not a
#     system-wide env var.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: boomtime-secrets
  labels:
    app.kubernetes.io/name: boomtime
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  target:
    name: boomtime-secrets
    creationPolicy: Owner
    template:
      data:
        GITHUB_TOKEN: "{{ .githubToken }}"
        BOOM_REMOTE_WRITE_URL: "{{ .remoteWriteUrl }}"
        BOOM_REMOTE_WRITE_TOKEN: "{{ .remoteWriteToken }}"
  data:
    - secretKey: githubToken
      remoteRef:
        key: boomtime
        property: github-token
    - secretKey: remoteWriteUrl
      remoteRef:
        key: boomtime
        property: remote-write-url
    - secretKey: remoteWriteToken
      remoteRef:
        key: boomtime
        property: remote-write-token
