---
# Local dev: Tilt rebuilds and injects the image as `boomtime:dev`.
# Also skip pulling since the image is loaded locally.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: boomtime
spec:
  template:
    spec:
      containers:
        - name: boomtime
          image: boomtime:dev
          imagePullPolicy: Never
