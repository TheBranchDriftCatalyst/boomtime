---
# Local dev credentials. NOT for prod (talos00-knowledgedump overlay uses CNPG-
# managed + ExternalSecret from 1Password). Safe to commit — values are dev-only
# and the postgres service is ClusterIP inside the local k3s.
apiVersion: v1
kind: Secret
metadata:
  name: boomtime-postgres-app
  labels:
    app.kubernetes.io/component: database
type: kubernetes.io/basic-auth
stringData:
  username: boomtime
  password: boomtime-dev
---
apiVersion: v1
kind: Secret
metadata:
  name: boomtime-secrets
  labels:
    app.kubernetes.io/name: boomtime
type: Opaque
stringData:
  # Blank means the forwarder/GH-attribution features are inactive. Populate via
  # a .env.local overlay patch or `kubectl create secret` if you want to
  # exercise them locally. WAKATIME_API_KEY is per-user from the frontend, not
  # here.
  GITHUB_TOKEN: ""
  BOOM_REMOTE_WRITE_URL: ""
  BOOM_REMOTE_WRITE_TOKEN: ""
